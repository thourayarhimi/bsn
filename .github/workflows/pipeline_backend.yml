name: BSN Backend API Pipeline

on:
  push:
    branches:
      - main
    paths:
      - book-network/**
      - docker/backend/**
      - 'docker-compose.yml'
      - .github/workflows/*_backend.yml
  workflow_dispatch: # allows manual trigger from Actions tab

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      EMAIL_HOSTNAME: ${{ secrets.EMAIL_HOST_NAME }}
      EMAIL_USER_NAME: ${{ secrets.EMAIL_USER_NAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    name: Compile project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Compile project
        run: |
          cd book-network
          ./mvnw clean compile

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5431:5432
        env:
          POSTGRES_DB: book_social_network12
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: rhimi
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      EMAIL_HOSTNAME: ${{ secrets.EMAIL_HOST_NAME }}
      EMAIL_USER_NAME: ${{ secrets.EMAIL_USER_NAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    name: Build backend
    needs: [ compile ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: build  project
        run: |
          cd book-network
          ./mvnw clean package

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    env:
      EMAIL_HOSTNAME: ${{ secrets.EMAIL_HOST_NAME }}
      EMAIL_USER_NAME: ${{ secrets.EMAIL_USER_NAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    needs: [ build ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: build  project
        run: |
          cd book-network
          ./mvnw clean package
      - name: Extract project version
        id: extract_version
        run: |
          cd book-network
          echo "VERSION=$(./mvnw -q -Dexec.executable='echo' -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: book-network
          file: docker/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bsn-api:${{ steps.extract_version.outputs.VERSION }},${{ secrets.DOCKERHUB_USERNAME }}/bsn-api:latest
          build-args: |
            PROFILE=dev
            APP_VERSION=${{ steps.extract_version.outputs.VERSION }}


  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    env:
      EMAIL_HOSTNAME: ${{ secrets.EMAIL_HOST_NAME }}
      EMAIL_USER_NAME: ${{ secrets.EMAIL_USER_NAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    needs: [ build-image ]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Create deployment folder
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "mkdir -p ci-cd"

      - name: Copy docker-compose file
        run: scp -oStrictHostKeyChecking=no docker-compose.yml ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }}:ci-cd/docker-compose.yml

      - name: Set ENV variable and deploy
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} <<EOF
          export EMAIL_HOST_NAME=${{ secrets.EMAIL_HOST_NAME }}
          export EMAIL_USER_NAME=${{ secrets.EMAIL_USER_NAME }}
          export EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          cd ci-cd
          docker compose -f docker-compose.yml pull -q
          docker compose -f docker-compose.yml up -d
          EOF