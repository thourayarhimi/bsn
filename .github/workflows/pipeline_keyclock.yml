name: Bsn Keycloak Pipeline

on:
  push:
    branches:
      - main
    paths:
      - Docker/keyclock/**
      - 'docker-compose.yml'
      - .github/workflows/*_keyclock.yml
  workflow_dispatch: # allows manual trigger from Actions tab

jobs:
  build-image:
    name: Build Keyclock Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Show files
        run: ls -la
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Docker/keyclock/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bsn-keycloak:latest


  deploy:
    name: Deploy Keyclock
    runs-on: ubuntu-latest
    needs: [ build-image ]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Create deployment folder
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "mkdir -p ci-cd"
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Copy docker-compose file
        run: scp -o StrictHostKeyChecking=no ./docker-compose.yml ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }}:ci-cd/docker-compose.yml

      - name: Set ENV variable and deploy
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} <<EOF
          cd ci-cd
          docker compose -f docker-compose.yml pull -q
          docker compose -f docker-compose.yml up -d
            # Wait for Keycloak container to be ready
             echo "Waiting for Keycloak to start..."
             # Wait for Keycloak to be healthy
              echo "Waiting for Keycloak to be ready..."
              while ! docker exec bsn-keycloak curl -s -f http://localhost:8080/health/ready > /dev/null; do
                 echo "Keycloak not ready yet... waiting 5 seconds"
              sleep 5 
              done
              echo "Keycloak is ready! Configuring..."
            # Disable SSL and configure Keycloak via kcadm.sh
             docker exec bsn-keycloak /opt/keycloak/bin/kcadm.sh config credentials \
            --server http://localhost:8080 \
            --realm master \
            --user admin \
            --password admin
          docker exec bsn-keycloak /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
          EOF
