services:
  postgres:
    container_name: postgres-sql-bsn
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhimi
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: book_social_network12
    volumes:
      - postgres:/data/postgres
    ports:
      - 5431:5432
    networks:
      - spring-demo
    restart: unless-stopped

  keycloak:
    container_name: keycloak-bsn
    image: quay.io/keycloak/keycloak:24.0.2
    ports:
      - 9090:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: 57.129.114.49
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      
    networks:
      - spring-demo
    command:
      - start-dev
      - --http-enabled=true
      - --hostname-strict=false
      
  bsn-api:
    container_name: bsn-api
    image: thouraya0344/bsn-api:1.0.5
    ports:
      - 8088:8088
    networks:

      - spring-demo
    depends_on:
      - postgres
  bsn-ui:
    container_name: bsn-ui
    image: thouraya0344/bsn-ui:latest
    ports:
      - 8080:80
    networks:
      - spring-demo
    depends_on:
      - bsn-api
networks:
  spring-demo:
    driver: bridge

volumes:
  postgres:
    driver: local
