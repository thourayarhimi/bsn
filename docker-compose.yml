services:
  postgres:
    container_name: postgres-sql-bsn
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhimi
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: book_social_network12
    volumes:
      - postgres:/data/postgres
    ports:
      - 5431:5432
    networks:
      - spring-demo
    restart: unless-stopped

  postgres-keycloak:
    container_name: postgres-keycloak
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhimi
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: keycloak
    volumes:
      - postgres:/data/postgres
    ports:
      - 5432:5432
    networks:
      - spring-demo
    restart: unless-stopped

  keycloak:
    container_name: bsn-keycloak
    image: thouraya0344/bsn-keycloak:latest
    ports:
      - 9090:8080
    depends_on:
      - postgres-keycloak
    networks:
      - spring-demo
    restart: unless-stopped
      
  bsn-api:
    container_name: bsn-api
    image: thouraya0344/bsn-api:1.0.5
    ports:
      - 8088:8088
    networks:

      - spring-demo
    depends_on:
      - postgres
  bsn-ui:
    container_name: bsn-ui
    image: thouraya0344/bsn-ui:latest
    ports:
      - 8080:80
    networks:
      - spring-demo
    depends_on:
      - bsn-api
networks:
  spring-demo:
    driver: bridge

volumes:
  postgres:
    driver: local
