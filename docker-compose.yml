services:
  postgres:
    container_name: postgres-sql-bsn
    restart: unless-stopped
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhimi
      POSTGRES_DB: book_social_network12
    volumes:
      - postgres_bsn:/var/lib/postgresql/data
    ports:
      - 5431:5432
    networks:
      - spring-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d book_social_network12"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-keycloak:
    container_name: postgres-keycloak
    restart: unless-stopped
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhimi
      POSTGRES_DB: keycloak
    volumes:
      - postgres_keycloak:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - spring-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    container_name: bsn-keycloak
    image: thouraya0344/bsn-keycloak:latest
    ports:
      - 9090:8080
    depends_on:
      postgres-keycloak:
        condition: service_healthy
      
    networks:
      - spring-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
      
  bsn-api:
    container_name: bsn-api
    image: thouraya0344/bsn-api:1.0.5
    restart: unless-stopped
    ports:
      - 8088:8088
    networks:
      - spring-demo
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/uploads
  bsn-ui:
    container_name: bsn-ui
    restart: unless-stopped
    image: thouraya0344/bsn-ui:latest
    ports:
      - 8080:80
    networks:
      - spring-demo
    depends_on:
      - bsn-api
networks:
  spring-demo:
    driver: bridge

volumes:
  postgres_bsn:
  postgres_keycloak:
