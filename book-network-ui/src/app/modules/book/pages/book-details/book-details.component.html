



<section class="book-overview">

  <!-- Book Cover -->
  <div class="img">
    <img
                [src]="bookCover"
                [alt]="book.title"
              />
  </div>

  <!-- Book Content -->
  <div class="book-content">
    <h4>{{ book.title }}</h4>

    <div class="meta">
      <div class="review">
        <div class="rating">
          <i
            *ngFor="let star of [1, 2, 3, 4, 5]"
            class="fa-star"
            [class.fa-solid]="star <= (book.rate || 0)"
            [class.fa-regular]="star > (book.rate || 0)"
          ></i>
          <span>{{ book.rate }}</span>
        </div>
        <div class="comment-like">
          <small>
            <i class="fa-regular fa-comment"></i>
            <span>{{ feedbacks.totalElements || 0 }} Reviews</span>
          </small>
          <small>
            <i class="fa-solid fa-user"></i>
            <span>{{ book.owner }}</span>
          </small>
        </div>
      </div>

      <div class="social-btn">
        <a href=""><i class="fa-brands fa-facebook-f"></i> Facebook</a>
        <a href=""><i class="fa-brands fa-twitter"></i> Twitter</a>
        <a href=""><i class="fa-brands fa-whatsapp"></i> Whatsapp</a>
        <a href=""><i class="fa-regular fa-envelope"></i> Email</a>
      </div>
    </div>

    <p>{{ book.synopsis }}</p>

    <div class="footer">
      <div class="author-detail">
        <div class="author">
          <small>Written by</small>
          <strong>{{ book.authorName }}</strong>
        </div>
        <div class="publisher">
          <small>ISBN</small>
          <strong>{{ book.isbn }}</strong>
        </div>
      </div>
      <div class="badge">
        <span *ngIf="book.shareable">
          <i class="fa-solid fa-share-nodes"></i> Shareable
        </span>
        <span *ngIf="!book.archived">
          <i class="fa-solid fa-shield"></i> Available
        </span>
        <span *ngIf="book.archived" class="archived">
          <i class="fa-solid fa-box-archive"></i> Archived
        </span>
      </div>
    </div>

    <div class="input-group">
      <button class="cartbtn" (click)="borrowBook(book)">
        <i class="fa-solid fa-book-open"></i> Borrow
      </button>
      <button class="like" (click)="toggleLike()" [class.liked]="liked">
        <i class="fa-heart" [class.fa-solid]="liked" [class.fa-regular]="!liked"></i>
      </button>
    </div>

  </div>
</section>

<!-- Feedbacks -->
<div class="book-info">
  <div class="detail-customer">
    <div class="customer-review" style="display:block">

      <div *ngFor="let feedback of feedbacks.content" class="reviewer-container">
        <div class="review">
          <div class="review-footer">
            <p>{{ feedback.comment }}</p>
            <div class="rating-star">
              <i
                *ngFor="let star of [1, 2, 3, 4, 5]"
                class="fa-star"
                [class.fa-solid]="star <= (feedback.note || 0)"
                [class.fa-regular]="star > (feedback.note || 0)"
              ></i>
              <strong>{{ feedback.note }}</strong>
            </div>
          </div>
        </div>
      </div>
      

      <!-- Feedback Pagination -->
      <div class="footer" style="margin-top: 2rem;">
        <div class="pagination">
          <button (click)="goToFirstPage()" [disabled]="page === 0">
            <i class="fa-solid fa-angles-left"></i>
          </button>
          <button (click)="goToPreviousPage()" [disabled]="page === 0">
            <i class="fa fa-chevron-left"></i> Previous
          </button>

          <div class="number">
            
             <a  *ngFor="let pageIndex of pages"
              href="javascript:void(0)"
              (click)="gotToPage(pageIndex)"
              [class.active]="page === pageIndex"
            >{{ pageIndex + 1 }}</a>
          </div>

          <button (click)="goToNextPage()" [disabled]="isLastPage">
            Next <i class="fa fa-chevron-right"></i>
          </button>
          <button (click)="goToLastPage()" [disabled]="isLastPage">
            <i class="fa-solid fa-angles-right"></i>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
