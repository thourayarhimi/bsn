
<section class="filter">
  <div class="book-grid-container">
    <div class="book-collections">

      <div class="collections-header">
        <h4>Manage My Book</h4>
      </div>

      <!-- Error Messages -->
      <div class="error-box" *ngIf="errorMsg.length">
        <p *ngFor="let msg of errorMsg">
          <i class="fas fa-circle-exclamation"></i> {{ msg }}
        </p>
      </div>

      <div class="manage-layout">

        <!-- Cover Upload -->
        <div class="cover-upload">
          <img
            [src]="selectedPicture || 'assets/images/default-book.jpg'"
            alt="Book Cover"
            class="cover-preview"
          />
          <label for="formFile" class="upload-label">
            <i class="fas fa-upload"></i> Upload Cover
          </label>
          <input
            (change)="onFileSelected($event)"
            type="file"
            id="formFile"
            accept="image/*"
            hidden
          />
        </div>

        <!-- Book Form -->
        <div class="book-form">

          <div class="form-field">
            <label for="title">Title</label>
            <input
              [(ngModel)]="bookRequest.title"
              type="text"
              id="title"
              name="title"
              placeholder="Book title"
            />
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="author">Author Name</label>
              <input
                [(ngModel)]="bookRequest.authorName"
                type="text"
                id="author"
                name="author"
                placeholder="Author name"
              />
            </div>
            <div class="form-field">
              <label for="isbn">ISBN</label>
              <input
                [(ngModel)]="bookRequest.isbn"
                type="text"
                id="isbn"
                name="isbn"
                placeholder="ISBN"
              />
            </div>
          </div>

          <div class="form-field">
            <label for="synopsis">Synopsis</label>
            <textarea
              [(ngModel)]="bookRequest.synopsis"
              rows="5"
              id="synopsis"
              name="synopsis"
              placeholder="Write a short synopsis..."
            ></textarea>
          </div>

          <div class="shareable-check">
            <input
              [(ngModel)]="bookRequest.shareable"
              type="checkbox"
              id="shareable"
              name="shareable"
            />
            <label for="shareable">Make this book shareable</label>
          </div>

          <div class="form-actions">
            <button (click)="saveBook()" class="save-btn">
              <i class="fas fa-save"></i> Save
            </button>
            <a routerLink="/books/my-books" class="cancel-btn-sm">
              <i class="fas fa-times"></i> Cancel
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
