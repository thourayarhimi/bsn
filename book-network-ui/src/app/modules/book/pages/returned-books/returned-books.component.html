
<section class="filter">
  <div class="book-grid-container">
    <div class="book-collections">

      <h4>My Returned Books</h4>

      <!-- Alert -->
      <div
        *ngIf="message"
        class="alert"
        [class.alert-danger]="level === 'error'"
        [class.alert-success]="level === 'success'"
        role="alert"
      >
        <p>{{ message }}</p>
      </div>

      <div class="category">
        <div class="category-list">
          <button>Today</button>
          <button>This Week</button>
          <button>This Month</button>
        </div>
      </div>

      <div class="borrowed-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Author</th>
              <th>ISBN</th>
              <th>Rate</th>
              <th>Borrowed By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let book of returnedBooks.content; let index = index">
              <td>{{ index + 1 }}</td>
              <td>{{ book.title }}</td>
              <td>{{ book.authorName }}</td>
              <td>{{ book.isbn }}</td>
              <td>
                <span class="rate-badge">★ {{ book.rate }}</span>
              </td>
              <td>{{book.borrowedBy}}</td>
              <td>
                <div class="action-icons">
                  <i
                    *ngIf="book.returned"
                    class="fas fa-paper-plane returned"
                    title="Book has been returned"
                  ></i>
                  <i
                    *ngIf="!book.returned"
                    class="fas fa-paper-plane returnable"
                    title="Not yet returned"
                  ></i>
                  <i
                    class="fas fa-circle-check"
                    (click)="approveBookReturn(book)"
                    [class.approved]="book.returnApproved"
                    [class.pending]="!book.returnApproved"
                    [title]="book.returnApproved ? 'Return approved' : 'Click to approve return'"
                  ></i>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Footer Pagination -->
      <div class="footer">
        <div class="data-shown">
          <p>Showing {{ returnedBooks.content?.length }} from {{ returnedBooks.totalElements }} data</p>
        </div>
        <div class="pagination">
          <button (click)="goToFirstPage()" [disabled]="page === 0">
            <i class="fas fa-angles-left"></i>
          </button>
          <button (click)="goToPreviousPage()" [disabled]="page === 0">
            <i class="fas fa-chevron-left"></i> Previous
          </button>
          <div class="number">
            
            <a   *ngFor="let pageIndex of pages"
              href="javascript:void(0)"
              (click)="gotToPage(pageIndex)"
              [class.active]="page === pageIndex"
            >{{ pageIndex + 1 }}</a>
          </div>
          <button (click)="goToNextPage()" [disabled]="isLastPage">
            Next <i class="fas fa-chevron-right"></i>
          </button>
          <button (click)="goToLastPage()" [disabled]="isLastPage">
            <i class="fas fa-angles-right"></i>
          </button>
        </div>
      </div>

    </div>
  </div>
</section>
